name: CI

# Workflow artifact retention is set per upload below (7d vs max on release/tags).
# Workflow run logs follow repository Settings → Actions → Artifact and log retention;
# set that to 7 days if you want logs to match. Indefinite “pins” for releases use
# GitHub Release assets and GHCR image tags, not workflow artifact storage.

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun check

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Write CI run marker
        run: |
          printf '%s\n' "${{ github.sha }}" "${{ github.event_name }}" "${{ github.ref }}" > ci-run-marker.txt

      - name: Upload CI run marker
        uses: actions/upload-artifact@v4
        with:
          name: ci-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-run-marker.txt
          if-no-files-found: error
          retention-days: ${{ (github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')) && (github.event.repository.private && 400 || 90) || 7 }}

  docker:
    needs: check-and-build
    # Images: `main` on default branch; version tag + `latest` when a GitHub Release is published (one build, identical digests).
    if: success() && (github.ref == 'refs/heads/main' || github.event_name == 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}

      # amd64 only: sharp + @kreuzberg ship arm64 binaries, but multi-arch CI builds
      # run arm64 under QEMU and bun install for that graph is brittle. Revisit with
      # native arm64 runners or a proven bake matrix if we need linux/arm64 images.
      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
