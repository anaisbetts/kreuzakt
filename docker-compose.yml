# Runtime data lives under DATA_DIR (default /data in the published image).
# Mount one volume on /data, or set INGEST_DIR, ORIGINALS_DIR, THUMBNAILS_DIR, DB_PATH
# and mount each path separately.
#
# Pull instead of build: set `image: ghcr.io/<owner>/<repo>:<tag>` and remove `build:`.
# Tags: `main` tracks the default branch; `latest` matches the latest published GitHub Release (not prerelease).

services:
  docs-ai:
    build: .
    image: docs-ai:local
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATA_DIR: /data
      OPENROUTER_KEY: ${OPENROUTER_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    volumes:
      - docs_ai_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  docs_ai_data:
