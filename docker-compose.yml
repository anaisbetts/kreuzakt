# Runtime data lives under DATA_DIR (default /data in the published image).
# Mount one volume on /data, or set INGEST_DIR, ORIGINALS_DIR, THUMBNAILS_DIR, DB_PATH
# and mount each path separately.
#
# Pull instead of build: set `image: ghcr.io/<owner>/<repo>:latest` and remove `build:`.

services:
  docs-ai:
    build: .
    image: docs-ai:local
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATA_DIR: /data
      OPENROUTER_KEY: ${OPENROUTER_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    volumes:
      - docs_ai_data:/data
    restart: unless-stopped

volumes:
  docs_ai_data:
